<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
    <link rel="icon" type="image/x-icon" href="/images/calculator-icon_34473.ico">
</head>
<body>
    <div class ="calculator-container">
        <div class ="display">
            <input type="text" id="display" enabled>
        </div>
        <div class ="numpad">
            <button class="button button1">1</button>
            <button class="button button2">2</button>
            <button class="button button3">3</button>
            <button class="button button4">4</button>
            <button class="button button5">5</button>
            <button class="button button6">6</button>
            <button class="button button7">7</button>
            <button class="button button8">8</button>
            <button class="button button9">9</button>
            <button class="button button0">0</button>
            <button class="button buttonDot">.</button>
            <button class="button buttonEqual">=</button>
        </div>
        <div class="operators">
            <button class="box" style="grid-area: box-1">+</button>
            <button class="box" style="grid-area: box-2">-</button>
            <button class="box" style="grid-area: box-3">*</button>
            <button class="box" style="grid-area: box-4">/</button>
            <button class="box" style="grid-area: box-5">C</button>    
        </div>
    </div>
</body>
</html>
