<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
    <link rel="icon" type="image/x-icon" href="/images/calculator-icon_34473.ico">
</head>
<body>
    <div class ="calculator-container">
        <div class ="display">
            <input type="text" id="display" disabled>
            <img src ="images/backspace.ico" alt="Backspace" id="backspace" onclick="backspace()" style="display: none;">
            <img src ="images/history.ico" alt="History" id="history" onclick="toggleHistory()" style="display: none">
        </div>
        <div class ="numpad">
            <button class="button" onclick="incrementDisplay('1')">1</button>
            <button class="button" onclick="incrementDisplay('2')">2</button>
            <button class="button" onclick="incrementDisplay('3')">3</button>
            <button class="button" onclick="incrementDisplay('4')">4</button>
            <button class="button" onclick="incrementDisplay('5')">5</button>
            <button class="button" onclick="incrementDisplay('6')">6</button>
            <button class="button" onclick="incrementDisplay('7')">7</button>
            <button class="button" onclick="incrementDisplay('8')">8</button>
            <button class="button" onclick="incrementDisplay('9')">9</button>
            <button class="button" onclick="incrementDisplay('0')">0</button>
            <button class="button" onclick="incrementDisplay('.')">.</button>
            <button class="button" onclick="calculate()">=</button>
        </div>
        <div class="operators">
            <button class="box" style="grid-area: box-1" onclick="incrementDisplay('+')">+</button>
            <button class="box" style="grid-area: box-2" onclick="incrementDisplay('-')">-</button>
            <button class="box" style="grid-area: box-3" onclick="incrementDisplay('*')">*</button>
            <button class="box" style="grid-area: box-4" onclick="incrementDisplay('/')">/</button>
            <button class="box box-clear" style="grid-area: box-5" onclick="clearDisplay()">Clear</button>    
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
